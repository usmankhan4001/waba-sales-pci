name: CI

# Gates PRs only - lint/typecheck/test/build-verify before merge. Dokploy handles actual
# deployment via its own push-to-deploy watch on main; this workflow never deploys anything,
# so there's no competing deploy mechanism.
on:
  pull_request:
  push:
    branches: [main]

# Node 20 matches both Dockerfiles (node:20-alpine) - build-parity with what's actually
# deployed matters more here than the newer Node version some frontend deps warn about
# (those warnings are non-fatal, confirmed against a real Dokploy build).
env:
  NODE_VERSION: '20'

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  frontend:
    name: Frontend (lint + typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          # Build-time only, for CI verification - the real deploy relies on this being
          # set as a *runtime* container env var instead (see server/plugins/checkConfig.ts
          # and nuxt.config.ts for why this can't be a fatal build-time requirement).
          NUXT_PUBLIC_BACKEND_URL: https://ci-placeholder.example.com
