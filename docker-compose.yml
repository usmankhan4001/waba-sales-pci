services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - '3000:3000'
    volumes:
      # backend/src/store/*.js persists tokens.json, suppressedNumbers.json, sendCounts.json,
      # connectTokens.json, idempotencyKeys.json and analytics.jsonl under backend/data/ -
      # without this volume, every redeploy wipes them, which already caused a real outage
      # (lost Bitrix OAuth install token broke every Drive file download). This is the
      # single most important line in this file - see DEPLOYMENT.md for the equivalent
      # Dokploy-dashboard volume-mount configuration if Dokploy isn't reading this file directly.
      - waba-backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - ./frontend/.env
    ports:
      - '3001:3000'
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  waba-backend-data:
